{% extends "base.html" %}

{% block content %}

<div class="title">
    Jobs
</div>

{% for job in jobs %}

<div class="card">

    <h3>{{ job.title }}</h3>

    <p>
        <strong>Company:</strong>
        {{ job.company }}
    </p>

    <p>
        <strong>Location:</strong>
        {{ job.location }}
    </p>

    <p>
        <strong>Source:</strong>
        {{ job.source }}
    </p>

    <p>
        <strong>Apply Link:</strong>

        <a href="{{ job.apply_link }}"
        target="_blank">

        Open Job

        </a>

    </p>

</div>

{% endfor %}

{% endblock %}
